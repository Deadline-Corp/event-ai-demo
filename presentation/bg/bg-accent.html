<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; background: #04060B; }
.bg { position: absolute; inset: 0; background: #030509; }
/* Large bold glow center-right */
.glow-main {
  position: absolute;
  top: -100px;
  right: -50px;
  width: 750px;
  height: 750px;
  background: radial-gradient(ellipse at center, rgba(44,123,255,0.28) 0%, rgba(44,123,255,0.12) 35%, rgba(44,123,255,0.04) 60%, transparent 75%);
  border-radius: 50%;
}
/* Secondary glow bottom center-left */
.glow-secondary {
  position: absolute;
  bottom: -60px;
  left: 300px;
  width: 500px;
  height: 350px;
  background: radial-gradient(ellipse at center, rgba(44,123,255,0.14) 0%, rgba(44,123,255,0.04) 55%, transparent 70%);
  border-radius: 50%;
}
/* Accent glow top-left small */
.glow-tl {
  position: absolute;
  top: 50px;
  left: 80px;
  width: 250px;
  height: 250px;
  background: radial-gradient(ellipse at center, rgba(90,160,255,0.10) 0%, transparent 65%);
  border-radius: 50%;
}
/* Grid overlay */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 85% 85% at 55% 50%, black 10%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 85% 85% at 55% 50%, black 10%, transparent 100%);
}
/* Accent arc top-right */
.arc {
  position: absolute;
  top: -30px;
  right: 60px;
  width: 460px;
  height: 460px;
  border: 1px solid rgba(44,123,255,0.15);
  border-radius: 50%;
}
/* Thin horizontal accent */
.line-h {
  position: absolute;
  bottom: 140px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(44,123,255,0.18) 15%, rgba(44,123,255,0.35) 50%, rgba(44,123,255,0.18) 85%, transparent 100%);
}
/* Left accent line */
.accent-line {
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 1080px;
  background: linear-gradient(180deg, transparent 0%, rgba(44,123,255,0.45) 25%, rgba(44,123,255,0.60) 60%, rgba(44,123,255,0.20) 90%, transparent 100%);
}
/* Top border glow */
.top-border {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(44,123,255,0.35) 30%, rgba(44,123,255,0.55) 60%, rgba(44,123,255,0.15) 90%, transparent 100%);
}
/* Vignette */
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 110% 110% at 50% 50%, transparent 40%, rgba(2,4,8,0.60) 100%);
}
/* Dot pattern */
.dots {
  position: absolute;
  right: 0;
  bottom: 0;
  width: 600px;
  height: 400px;
  background-image: radial-gradient(circle, rgba(44,123,255,0.15) 1px, transparent 1px);
  background-size: 24px 24px;
  mask-image: radial-gradient(ellipse 70% 70% at 90% 90%, black 0%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 70% 70% at 90% 90%, black 0%, transparent 100%);
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow-main"></div>
  <div class="glow-secondary"></div>
  <div class="glow-tl"></div>
  <div class="grid"></div>
  <div class="dots"></div>
  <div class="arc"></div>
  <div class="accent-line"></div>
  <div class="top-border"></div>
  <div class="line-h"></div>
  <div class="vignette"></div>
</body>
</html>
