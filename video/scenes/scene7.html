<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Scene 7 – Финал</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

  /* ===================== KEYFRAMES ===================== */

  /* Slow zoom-in over 6.6s — eased for buttery feel */
  @keyframes bgZoom {
    from { transform: scale(1); }
    to   { transform: scale(1.10); }
  }

  /* FG content subtle counter-drift for parallax */
  @keyframes fgParallax {
    from { transform: translate(0, 0); }
    to   { transform: translate(-3px, 2px); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo scale-in with glow */
  @keyframes logoIn {
    0%   { opacity: 0; transform: scale(0.72); }
    65%  { transform: scale(1.06); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Logo shine sweep — plays ONCE then continuous glow */
  @keyframes logoShineOnce {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* Glow pulse on big logo text */
  @keyframes logoGlow {
    0%,100% { text-shadow: 0 4px 60px rgba(0,0,0,0.80), 0 0 40px rgba(44,123,255,0.15); }
    50%     { text-shadow: 0 4px 60px rgba(0,0,0,0.80), 0 0 80px rgba(44,123,255,0.45); }
  }

  @keyframes badgePop {
    0%   { opacity: 0; transform: scale(0.65) translateY(8px); }
    70%  { transform: scale(1.06) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes dotPulse {
    0%,100% { box-shadow: 0 0 8px rgba(44,123,255,0.80); transform: scale(1); }
    50%     { box-shadow: 0 0 16px rgba(44,123,255,1.0); transform: scale(1.3); }
  }

  @keyframes revealClip {
    from { clip-path: inset(0 0 100% 0); opacity: 0; }
    to   { clip-path: inset(0 0 0% 0);   opacity: 1; }
  }

  @keyframes cityDotIn {
    from { opacity: 0; transform: scale(0.60) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes statIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-60px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(1140px) rotate(720deg); opacity: 0.4; }
  }

  @keyframes confettiSway {
    0%,100% { margin-left: 0; }
    25%     { margin-left: 28px; }
    75%     { margin-left: -28px; }
  }

  /* ===================== CONFETTI ===================== */

  .confetti-layer {
    position: absolute; inset: 0; pointer-events: none; z-index: 10; overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    top: -60px;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  .confetti-piece:nth-child(1)  { left:4%;   width:8px;  height:14px; background:#FF6B6B; animation: confettiFall 4.2s 0.0s infinite, confettiSway 1.8s 0.0s ease-in-out infinite; }
  .confetti-piece:nth-child(2)  { left:9%;   width:12px; height:10px; background:#FFD93D; border-radius:50%; animation: confettiFall 3.8s 0.4s infinite, confettiSway 2.1s 0.2s ease-in-out infinite; }
  .confetti-piece:nth-child(3)  { left:15%;  width:9px;  height:9px;  background:#6BCB77; animation: confettiFall 5.1s 0.8s infinite, confettiSway 1.6s 0.5s ease-in-out infinite; }
  .confetti-piece:nth-child(4)  { left:22%;  width:11px; height:7px;  background:#5AA0FF; border-radius:50%; animation: confettiFall 4.5s 0.2s infinite, confettiSway 2.3s 0.1s ease-in-out infinite; }
  .confetti-piece:nth-child(5)  { left:29%;  width:7px;  height:13px; background:#FF9F43; animation: confettiFall 3.6s 1.1s infinite, confettiSway 1.9s 0.7s ease-in-out infinite; }
  .confetti-piece:nth-child(6)  { left:35%;  width:10px; height:10px; background:#FF6B6B; border-radius:50%; animation: confettiFall 4.8s 0.5s infinite, confettiSway 2.0s 0.3s ease-in-out infinite; }
  .confetti-piece:nth-child(7)  { left:41%;  width:13px; height:8px;  background:#A29BFE; animation: confettiFall 4.0s 0.9s infinite, confettiSway 1.7s 0.6s ease-in-out infinite; }
  .confetti-piece:nth-child(8)  { left:47%;  width:8px;  height:12px; background:#FFD93D; animation: confettiFall 5.3s 0.3s infinite, confettiSway 2.4s 0.0s ease-in-out infinite; }
  .confetti-piece:nth-child(9)  { left:53%;  width:11px; height:9px;  background:#6BCB77; border-radius:50%; animation: confettiFall 4.1s 1.4s infinite, confettiSway 1.8s 0.9s ease-in-out infinite; }
  .confetti-piece:nth-child(10) { left:59%;  width:9px;  height:11px; background:#5AA0FF; animation: confettiFall 3.9s 0.7s infinite, confettiSway 2.2s 0.4s ease-in-out infinite; }
  .confetti-piece:nth-child(11) { left:65%;  width:14px; height:7px;  background:#FF6B6B; animation: confettiFall 4.7s 0.1s infinite, confettiSway 1.5s 0.2s ease-in-out infinite; }
  .confetti-piece:nth-child(12) { left:71%;  width:8px;  height:14px; background:#FF9F43; border-radius:50%; animation: confettiFall 5.0s 1.2s infinite, confettiSway 2.0s 0.8s ease-in-out infinite; }
  .confetti-piece:nth-child(13) { left:77%;  width:10px; height:10px; background:#A29BFE; animation: confettiFall 4.3s 0.6s infinite, confettiSway 1.9s 0.3s ease-in-out infinite; }
  .confetti-piece:nth-child(14) { left:83%;  width:12px; height:8px;  background:#FFD93D; animation: confettiFall 3.7s 1.0s infinite, confettiSway 2.3s 0.5s ease-in-out infinite; }
  .confetti-piece:nth-child(15) { left:89%;  width:7px;  height:13px; background:#6BCB77; border-radius:50%; animation: confettiFall 4.9s 0.4s infinite, confettiSway 1.7s 0.1s ease-in-out infinite; }
  .confetti-piece:nth-child(16) { left:93%;  width:11px; height:9px;  background:#5AA0FF; animation: confettiFall 4.4s 0.8s infinite, confettiSway 2.1s 0.6s ease-in-out infinite; }
  .confetti-piece:nth-child(17) { left:7%;   width:9px;  height:11px; background:#A29BFE; animation: confettiFall 5.2s 1.6s infinite, confettiSway 1.6s 1.1s ease-in-out infinite; }
  .confetti-piece:nth-child(18) { left:18%;  width:13px; height:7px;  background:#FF6B6B; border-radius:50%; animation: confettiFall 3.8s 2.0s infinite, confettiSway 2.4s 1.4s ease-in-out infinite; }
  .confetti-piece:nth-child(19) { left:32%;  width:8px;  height:12px; background:#FFD93D; animation: confettiFall 4.6s 1.8s infinite, confettiSway 1.8s 1.2s ease-in-out infinite; }
  .confetti-piece:nth-child(20) { left:45%;  width:10px; height:8px;  background:#6BCB77; animation: confettiFall 4.2s 2.2s infinite, confettiSway 2.0s 1.6s ease-in-out infinite; }
  .confetti-piece:nth-child(21) { left:57%;  width:12px; height:10px; background:#FF9F43; border-radius:50%; animation: confettiFall 5.0s 1.5s infinite, confettiSway 1.9s 1.0s ease-in-out infinite; }
  .confetti-piece:nth-child(22) { left:68%;  width:7px;  height:14px; background:#5AA0FF; animation: confettiFall 4.0s 2.4s infinite, confettiSway 2.2s 1.8s ease-in-out infinite; }
  .confetti-piece:nth-child(23) { left:79%;  width:11px; height:9px;  background:#A29BFE; animation: confettiFall 4.8s 1.3s infinite, confettiSway 1.7s 0.9s ease-in-out infinite; }
  .confetti-piece:nth-child(24) { left:91%;  width:9px;  height:11px; background:#FFD93D; border-radius:50%; animation: confettiFall 3.6s 2.6s infinite, confettiSway 2.3s 2.0s ease-in-out infinite; }

  /* ===================== ELEMENTS ===================== */

  .bg-photo {
    position: absolute; inset: 0;
    background: url('file:///D:/event-ai/video/gen/s7-celebration.png') center center / cover no-repeat;
    transform-origin: center center;
    animation: bgZoom 6.6s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(4,6,11,0.82) 0%,
      rgba(4,6,11,0.30) 22%,
      rgba(4,6,11,0.05) 45%,
      rgba(4,6,11,0.05) 58%,
      rgba(4,6,11,0.55) 78%,
      rgba(4,6,11,0.96) 100%
    );
  }

  .center-shadow {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 1200px; height: 600px;
    background: radial-gradient(ellipse, rgba(4,6,11,0.65) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Top-left logo — with shine sweep after entry */
  .logo {
    position: absolute; top: 52px; left: 64px; z-index: 30;
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeDown 0.55s 0.05s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .logo img { height: 36px; }
  /* Shine sweep on small logo text */
  .logo-shine-sm {
    font-size: 20px; font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(90deg, #EEF1F8 20%, #8EC5FF 40%, #EEF1F8 60%, #EEF1F8 80%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logoShineOnce 3.5s 1.5s ease-in-out infinite;
  }
  .logo-shine-sm span { -webkit-text-fill-color: #5AA0FF; }

  .scene-num {
    position: absolute; top: 56px; right: 64px; z-index: 30;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: rgba(238,241,248,0.35); letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeDown 0.4s 0.2s ease forwards;
  }

  /* Center content — parallax on fg */
  .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 22px; z-index: 20;
    text-align: center;
    animation: fgParallax 6.6s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  /* Big logo block — SHINE sweep on entry, then persistent glow */
  .big-logo {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    margin-bottom: 4px;
    opacity: 0;
    animation: logoIn 0.70s 0.28s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .big-logo img.mark { height: 88px; }

  /* Shine sweep on the big brand text (once on entry) */
  .big-logo-shine {
    font-size: 72px; font-weight: 700;
    letter-spacing: -0.03em; line-height: 1;
    background: linear-gradient(90deg,
      #EEF1F8 0%,
      #EEF1F8 20%,
      #8EC5FF 35%,
      #EEF1F8 50%,
      #EEF1F8 100%
    );
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation:
      logoShineOnce 1.2s 1.0s ease-in-out 1 forwards,
      logoGlow 2.5s 1.2s ease-in-out infinite;
    /* logoGlow as text-shadow requires a wrapper — use drop-shadow filter instead */
    filter: drop-shadow(0 0 30px rgba(44,123,255,0.25));
  }
  .big-logo-shine-accent {
    -webkit-text-fill-color: #2C7BFF;
  }

  /* Investment badge */
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 24px;
    border-radius: 100px;
    background: rgba(44,123,255,0.18);
    border: 1px solid rgba(44,123,255,0.45);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 500;
    color: #8EC5FF;
    letter-spacing: 0.10em; text-transform: uppercase;
    opacity: 0;
    animation: badgePop 0.55s 0.88s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2C7BFF;
    box-shadow: 0 0 8px rgba(44,123,255,0.80);
    animation: dotPulse 1.8s 1.5s ease-in-out infinite;
  }

  /* Tagline */
  .tagline {
    font-size: 38px; font-weight: 400;
    color: rgba(238,241,248,0.85);
    letter-spacing: -0.01em; line-height: 1.35;
    text-shadow: 0 2px 48px rgba(0,0,0,0.90);
    max-width: 980px;
    opacity: 0;
    animation: revealClip 0.65s 1.08s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .tagline strong { color: #EEF1F8; font-weight: 700; }

  /* City dots */
  .dots-row {
    display: flex; gap: 10px; align-items: center;
    margin-top: 6px;
  }
  .city-dot {
    border-radius: 100px;
    background: rgba(44,123,255,0.20);
    border: 1px solid rgba(44,123,255,0.35);
    padding: 6px 16px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    color: #5AA0FF; letter-spacing: 0.06em;
    opacity: 0;
    animation-name: cityDotIn;
    animation-duration: 0.40s;
    animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
    animation-fill-mode: forwards;
  }
  .city-dot.active {
    background: rgba(44,123,255,0.35);
    border-color: rgba(44,123,255,0.65);
    color: #9AC8FF;
  }
  .city-dot:nth-child(1) { animation-delay: 1.42s; }
  .city-dot:nth-child(2) { animation-delay: 1.55s; }
  .city-dot:nth-child(3) { animation-delay: 1.68s; }
  .city-dot:nth-child(4) { animation-delay: 1.81s; }

  /* Bottom bar */
  .bottom-bar {
    position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 28px;
    z-index: 20;
  }
  .stat {
    text-align: center;
    opacity: 0;
    animation-name: statIn;
    animation-duration: 0.50s;
    animation-timing-function: cubic-bezier(0.22, 0.6, 0.36, 1);
    animation-fill-mode: forwards;
  }
  .stat:nth-child(1) { animation-delay: 1.88s; }
  .stat:nth-child(3) { animation-delay: 2.02s; }
  .stat:nth-child(5) { animation-delay: 2.16s; }
  .stat:nth-child(7) { animation-delay: 2.30s; }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 34px; font-weight: 600; color: #EEF1F8;
    line-height: 1;
  }
  .stat-label {
    font-size: 13px; color: rgba(238,241,248,0.45); margin-top: 4px;
  }
  .divider {
    width: 1px; height: 44px;
    background: rgba(255,255,255,0.12);
    opacity: 0;
    animation: fadeDown 0.3s 1.98s ease forwards;
  }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay"></div>
  <div class="center-shadow"></div>

  <!-- Confetti layer -->
  <div class="confetti-layer">
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
  </div>

  <div class="logo">
    <img src="file:///D:/event-ai/assets/mark-dark.png" onerror="this.style.display='none'">
    <span class="logo-shine-sm">EVENT <span>AI</span></span>
  </div>
  <div class="scene-num">07 / 07</div>

  <div class="center">
    <!-- Big logo with shine -->
    <div class="big-logo">
      <img class="mark" src="file:///D:/event-ai/assets/mark-dark.png" onerror="this.style.display='none'">
      <div class="big-logo-shine">EVENT <span class="big-logo-shine-accent">AI</span></div>
    </div>

    <!-- Investment badge -->
    <div class="badge">
      <div class="badge-dot"></div>
      Investment opportunity
    </div>

    <!-- Tagline — updated shorter text -->
    <div class="tagline"><strong>EVENT AI</strong> — новый стандарт<br>event-рынка</div>

    <!-- City expansion dots -->
    <div class="dots-row">
      <div class="city-dot active">Алматы</div>
      <div class="city-dot">Астана</div>
      <div class="city-dot">Шымкент</div>
      <div class="city-dot">СНГ</div>
    </div>
  </div>

  <!-- Bottom stats bar -->
  <div class="bottom-bar">
    <div class="stat">
      <div class="stat-val">3 000+</div>
      <div class="stat-label">мероприятий в год</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-val">500+</div>
      <div class="stat-label">партнёров на платформе</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-val">7%</div>

  </div>
</body>
</html>
