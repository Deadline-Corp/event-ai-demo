<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Scene 1 – Проблема</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

  /* ===================== KEYFRAMES ===================== */

  /* Slow zoom-in over full 7.5s — smooth cubic ease for buttery feel */
  @keyframes bgZoomIn {
    from { transform: scale(1); }
    to   { transform: scale(1.10); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes revealClip {
    from { clip-path: inset(0 0 100% 0); opacity: 0; }
    to   { clip-path: inset(0 0 0% 0);   opacity: 1; }
  }

  @keyframes cardEntrance {
    from { opacity: 0; transform: scale(0.78) translateY(28px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes floatUp {
    0%,100% { translate: 0 0px; }
    50%     { translate: 0 -6px; }
  }
  @keyframes floatDown {
    0%,100% { translate: 0 0px; }
    50%     { translate: 0 6px; }
  }

  @keyframes sceneFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Logo shine sweep */
  @keyframes logoShine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* ===================== ELEMENTS ===================== */

  .bg-photo {
    position: absolute; inset: 0;
    background: url('file:///D:/event-ai/video/gen/s1-problem.png') center center / cover no-repeat;
    transform-origin: center center;
    animation: bgZoomIn 7.5s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  .overlay-top {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(4,6,11,0.72) 0%,
      rgba(4,6,11,0.20) 28%,
      rgba(4,6,11,0.15) 55%,
      rgba(4,6,11,0.75) 80%,
      rgba(4,6,11,0.95) 100%
    );
  }

  .overlay-tint {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 70% 40%, rgba(160,40,40,0.18) 0%, transparent 70%);
  }

  /* Parallax wrapper — bg moves slower than content (achieved via different scale/translate) */
  .parallax-fg {
    position: absolute; inset: 0;
    pointer-events: none;
    animation: bgZoomIn 7.5s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
    animation-name: none; /* fg stays fixed — creates parallax illusion */
  }

  .card {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 20px;
    border-radius: 12px;
    background: rgba(255,50,50,0.12);
    border: 1px solid rgba(255,90,90,0.30);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    font-size: 15px;
    font-weight: 500;
    color: #E8C8C8;
    white-space: nowrap;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 20px rgba(255,60,60,0.08);
    opacity: 0;
    animation-name: cardEntrance;
    animation-duration: 0.60s;
    animation-timing-function: cubic-bezier(0.22, 0.6, 0.36, 1);
    animation-fill-mode: forwards;
  }

  .card:nth-child(1) { animation-delay: 0.15s; }
  .card:nth-child(2) { animation-delay: 0.35s; }
  .card:nth-child(3) { animation-delay: 0.52s; }
  .card:nth-child(4) { animation-delay: 0.22s; }
  .card:nth-child(5) { animation-delay: 0.42s; }
  .card:nth-child(6) { animation-delay: 0.60s; }

  .card-wrap {
    position: absolute;
  }
  .card-wrap:nth-child(1) { animation: floatUp   3.4s 1.0s ease-in-out infinite; }
  .card-wrap:nth-child(2) { animation: floatDown 3.8s 1.2s ease-in-out infinite; }
  .card-wrap:nth-child(3) { animation: floatUp   4.1s 0.8s ease-in-out infinite; }
  .card-wrap:nth-child(4) { animation: floatDown 3.6s 1.4s ease-in-out infinite; }
  .card-wrap:nth-child(5) { animation: floatUp   3.9s 1.0s ease-in-out infinite; }
  .card-wrap:nth-child(6) { animation: floatDown 4.3s 0.6s ease-in-out infinite; }

  /* Logo with shine sweep on the text */
  .logo {
    position: absolute;
    top: 52px; left: 64px;
    z-index: 30;
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeDown 0.6s 0.1s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .logo img { height: 36px; }
  .logo-fallback {
    font-size: 20px; font-weight: 700; color: #EEF1F8; letter-spacing: 0.04em;
  }
  .logo-fallback span { color: #2C7BFF; }

  /* Shine sweep on logo text after entry */
  .logo-shine {
    font-size: 20px; font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(90deg, #EEF1F8 20%, #8EC5FF 40%, #EEF1F8 60%, #EEF1F8 80%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logoShine 3.5s 1.5s ease-in-out infinite;
  }
  .logo-shine span { -webkit-text-fill-color: #5AA0FF; }

  .scene-num {
    position: absolute; top: 56px; right: 64px; z-index: 30;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: rgba(238,241,248,0.35); letter-spacing: 0.12em;
    opacity: 0;
    animation: sceneFade 0.5s 0.3s ease forwards;
  }

  .headline-block {
    position: absolute;
    bottom: 80px;
    left: 50%; transform: translateX(-50%);
    text-align: center;
    z-index: 20;
  }

  .headline-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: #FF7070;
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.55s 0.65s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }

  .headline-main {
    font-size: 62px; font-weight: 700;
    color: #EEF1F8;
    line-height: 1.15; letter-spacing: -0.025em;
    max-width: 1160px;
    text-shadow: 0 2px 48px rgba(0,0,0,0.9), 0 0 80px rgba(0,0,0,0.6);
    opacity: 0;
    animation: revealClip 0.70s 0.85s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }

  .headline-main em { color: #FF6B6B; font-style: normal; }

  .chaos-lines {
    position: absolute; inset: 0; pointer-events: none; z-index: 5;
    opacity: 0;
    animation: sceneFade 1s 0.5s ease forwards;
  }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay-top"></div>
  <div class="overlay-tint"></div>

  <div class="logo" style="z-index:30">
    <img src="file:///D:/event-ai/assets/mark-dark.png" onerror="this.style.display='none'">
    <span class="logo-shine">EVENT <span>AI</span></span>
  </div>
  <div class="scene-num">01 / 07</div>

  <div class="card-wrap" style="left:60px; top:200px;">
    <div class="card" style="transform:rotate(-6deg);">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FF7070" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012.18 1h3a2 2 0 012 1.72"/></svg>
      Звонки подрядчикам
    </div>
  </div>

  <div class="card-wrap" style="left:88px; top:360px;">
    <div class="card" style="transform:rotate(8deg);">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FF7070" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Чаты в мессенджерах
    </div>
  </div>

  <div class="card-wrap" style="left:48px; top:540px;">
    <div class="card" style="transform:rotate(-10deg);">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FF7070" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      Договоры с каждым
    </div>
  </div>

  <div class="card-wrap" style="right:56px; top:210px;">
    <div class="card" style="transform:rotate(7deg);">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FF7070" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Технические сметы
    </div>
  </div>

  <div class="card-wrap" style="right:72px; top:390px;">
    <div class="card" style="transform:rotate(-7deg);">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FF7070" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/></svg>
      Поиск артистов
    </div>
  </div>

  <div class="card-wrap" style="right:40px; top:570px;">
    <div class="card" style="transform:rotate(5deg);">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#FF7070" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Предоплаты
    </div>
  </div>

  <svg class="chaos-lines" viewBox="0 0 1920 1080">
    <defs>
      <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L7,3 z" fill="rgba(255,70,70,0.25)"/>
      </marker>
    </defs>
    <line x1="300" y1="230" x2="700" y2="480" stroke="rgba(255,70,70,0.10)" stroke-width="1" stroke-dasharray="5,8" marker-end="url(#arr)"/>
    <line x1="300" y1="390" x2="650" y2="500" stroke="rgba(255,70,70,0.08)" stroke-width="1" stroke-dasharray="5,8"/>
    <line x1="1650" y1="240" x2="1300" y2="480" stroke="rgba(255,70,70,0.10)" stroke-width="1" stroke-dasharray="5,8" marker-end="url(#arr)"/>
    <line x1="1650" y1="420" x2="1350" y2="500" stroke="rgba(255,70,70,0.08)" stroke-width="1" stroke-dasharray="5,8"/>
  </svg>

  <div class="headline-block">
    <div class="headline-kicker">Проблема</div>
    <div class="headline-main">Организовать мероприятие —<br><em>долго и сложно</em></div>
  </div>
</body>
</html>
