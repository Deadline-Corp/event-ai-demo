<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Scene 4 – Подборка</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

  /* ===================== KEYFRAMES ===================== */

  /* Layout: phone center-left, headline right — 6.0s */
  @keyframes bgDrift {
    from { transform: scale(1.04) translate(0, 0); }
    to   { transform: scale(1.08) translate(-20px, -10px); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeRight {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes revealClip {
    from { clip-path: inset(0 0 100% 0); opacity: 0; }
    to   { clip-path: inset(0 0 0% 0);   opacity: 1; }
  }

  /* Phone bounce-in */
  @keyframes phoneEnter {
    0%   { opacity: 0; transform: scale(0.76) translateY(30px); }
    65%  { transform: scale(1.04) translateY(-5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Phone gentle float */
  @keyframes phoneFloat {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-6px); }
  }

  /* Logo shine */
  @keyframes logoShine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* ===================== ELEMENTS ===================== */

  .bg-photo {
    position: absolute; inset: 0;
    background: url('file:///D:/event-ai/video/gen/bg-hall.png') center center / cover no-repeat;
    filter: brightness(0.22) saturate(0.6);
    transform-origin: center center;
    animation: bgDrift 6.0s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(4,6,11,0.70) 0%,
      rgba(4,6,11,0.30) 20%,
      rgba(4,6,11,0.30) 75%,
      rgba(4,6,11,0.90) 100%
    );
  }

  .logo {
    position: absolute; top: 52px; left: 64px; z-index: 30;
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeDown 0.55s 0.05s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .logo img { height: 36px; }
  .logo-shine {
    font-size: 20px; font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(90deg, #EEF1F8 20%, #8EC5FF 40%, #EEF1F8 60%, #EEF1F8 80%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logoShine 3.5s 1.5s ease-in-out infinite;
  }
  .logo-shine span { -webkit-text-fill-color: #5AA0FF; }

  .scene-num {
    position: absolute; top: 56px; right: 64px; z-index: 30;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: rgba(238,241,248,0.35); letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeDown 0.4s 0.2s ease forwards;
  }

  /* Two-column layout: phone left, text right */
  .layout {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    padding: 0 120px;
    gap: 120px;
  }

  /* ===== REAL SCREENSHOT PHONE — Scene 4 ===== */
  .phone-shell {
    flex-shrink: 0;
    width: 340px; height: 700px;
    opacity: 0;
    animation: phoneEnter 0.72s 0.22s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }

  .phone-inner {
    width: 340px; height: 700px;
    animation: phoneFloat 4.2s 1.1s ease-in-out infinite;
  }

  .phone-frame {
    width: 340px; height: 700px;
    border-radius: 44px;
    background: #08090F;
    border: 2.5px solid rgba(255,255,255,0.16);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 40px 100px rgba(0,0,0,0.75),
      0 0 80px rgba(44,123,255,0.14),
      inset 0 0 0 1px rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }

  .phone-notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 30px;
    background: #08090F;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.10);
    z-index: 10;
  }

  .phone-screenshot {
    position: absolute; inset: 0;
    background: url('file:///D:/event-ai/video/demo/04_results.png') center center / cover no-repeat;
    border-radius: 42px;
  }

  .phone-top-blur {
    position: absolute; top: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(to bottom, rgba(8,9,15,0.8) 0%, transparent 100%);
    border-radius: 42px 42px 0 0;
    z-index: 5;
  }
  .phone-bottom-blur {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(to top, rgba(8,9,15,0.9) 0%, transparent 100%);
    border-radius: 0 0 42px 42px;
    z-index: 5;
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px;
  }
  .home-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; }

  /* Right text column */
  .text-col {
    flex: 1;
    max-width: 820px;
  }

  .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500; color: #5AA0FF;
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeRight 0.50s 0.35s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .kicker::before { content: ''; display: block; width: 32px; height: 1px; background: #5AA0FF; }

  .headline {
    font-size: 56px; font-weight: 700; color: #EEF1F8;
    letter-spacing: -0.025em; line-height: 1.1;
    text-shadow: 0 2px 48px rgba(0,0,0,0.9);
    margin-bottom: 24px;
    opacity: 0;
    animation: revealClip 0.70s 0.52s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .headline em { color: #2C7BFF; font-style: normal; }

  .sub {
    font-size: 22px; font-weight: 400;
    color: rgba(238,241,248,0.60);
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 0.55s 0.75s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }

  /* Category pills */
  .pills {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-top: 40px;
  }
  .pill {
    padding: 9px 18px;
    border-radius: 100px;
    background: rgba(44,123,255,0.12);
    border: 1px solid rgba(44,123,255,0.30);
    font-size: 13px; font-weight: 500;
    color: #8EC5FF;
    opacity: 0;
    animation: fadeUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-fill-mode: forwards;
  }
  .pill:nth-child(1) { animation-delay: 0.95s; }
  .pill:nth-child(2) { animation-delay: 1.08s; }
  .pill:nth-child(3) { animation-delay: 1.21s; }
  .pill:nth-child(4) { animation-delay: 1.34s; }
  .pill:nth-child(5) { animation-delay: 1.47s; }
  .pill:nth-child(6) { animation-delay: 1.60s; }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay"></div>

  <div class="logo">
    <img src="file:///D:/event-ai/assets/mark-dark.png" onerror="this.style.display='none'">
    <span class="logo-shine">EVENT <span>AI</span></span>
  </div>
  <div class="scene-num">04 / 07</div>

  <div class="layout">
    <!-- Phone with REAL screenshot -->
    <div class="phone-shell">
      <div class="phone-inner">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-screenshot"></div>
          <div class="phone-top-blur"></div>
          <div class="phone-bottom-blur">
            <div class="home-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Text column -->
    <div class="text-col">
      <div class="kicker">Подборка</div>
      <div class="headline">Персональная подборка<br><em>под событие</em></div>
      <div class="sub">AI анализирует запрос и предлагает<br>лучших подрядчиков по рейтингу</div>
      <div class="pills">
        <div class="pill">Площадки</div>
        <div class="pill">Ведущие</div>
        <div class="pill">Артисты</div>
        <div class="pill">Декор</div>
        <div class="pill">Фото / видео</div>
        <div class="pill">Кейтеринг</div>
      </div>
    </div>
  </div>
</body>
</html>
