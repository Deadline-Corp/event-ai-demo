<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Scene 5 – Документы</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

  /* ===================== KEYFRAMES ===================== */

  @keyframes bgDrift {
    from { transform: scale(1.04) translate(0, 0); }
    to   { transform: scale(1.08) translate(18px, -14px); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeRight {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes revealClip {
    from { clip-path: inset(0 0 100% 0); opacity: 0; }
    to   { clip-path: inset(0 0 0% 0);   opacity: 1; }
  }

  /* Phone bounce-in */
  @keyframes phoneEnter {
    0%   { opacity: 0; transform: scale(0.76) translateY(30px); }
    65%  { transform: scale(1.04) translateY(-5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes phoneFloat {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-6px); }
  }

  /* Logo shine */
  @keyframes logoShine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* ===================== ELEMENTS ===================== */

  .bg-photo {
    position: absolute; inset: 0;
    background: url('file:///D:/event-ai/video/gen/bg-hall.png') center center / cover no-repeat;
    filter: brightness(0.20) saturate(0.5);
    transform-origin: center center;
    animation: bgDrift 5.5s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(4,6,11,0.70) 0%,
      rgba(4,6,11,0.25) 25%,
      rgba(4,6,11,0.25) 70%,
      rgba(4,6,11,0.88) 100%
    );
  }

  .logo {
    position: absolute; top: 52px; left: 64px; z-index: 30;
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeDown 0.55s 0.05s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .logo img { height: 36px; }
  .logo-shine {
    font-size: 20px; font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(90deg, #EEF1F8 20%, #8EC5FF 40%, #EEF1F8 60%, #EEF1F8 80%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logoShine 3.5s 1.5s ease-in-out infinite;
  }
  .logo-shine span { -webkit-text-fill-color: #5AA0FF; }

  .scene-num {
    position: absolute; top: 56px; right: 64px; z-index: 30;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: rgba(238,241,248,0.35); letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeDown 0.4s 0.2s ease forwards;
  }

  /* Two-column: text left, phone right */
  .layout {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    padding: 0 120px;
    gap: 100px;
  }

  /* Left text column */
  .text-col {
    flex: 1;
    max-width: 820px;
  }

  .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: #5AA0FF;
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeUp 0.45s 0.25s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .kicker::before { content: ''; display: block; width: 32px; height: 1px; background: #5AA0FF; }

  .headline {
    font-size: 54px; font-weight: 700; color: #EEF1F8;
    letter-spacing: -0.025em; line-height: 1.1;
    text-shadow: 0 2px 48px rgba(0,0,0,0.9);
    margin-bottom: 24px;
    opacity: 0;
    animation: revealClip 0.70s 0.40s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .headline em { color: #2C7BFF; font-style: normal; }

  .sub {
    font-size: 22px; font-weight: 400;
    color: rgba(238,241,248,0.60);
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 0.55s 0.65s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }

  /* Feature list */
  .feature-list {
    margin-top: 40px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .feature-item {
    display: flex; align-items: center; gap: 14px;
    opacity: 0;
    animation: fadeUp 0.40s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
    animation-fill-mode: forwards;
  }
  .feature-item:nth-child(1) { animation-delay: 0.85s; }
  .feature-item:nth-child(2) { animation-delay: 0.98s; }
  .feature-item:nth-child(3) { animation-delay: 1.11s; }
  .feature-item:nth-child(4) { animation-delay: 1.24s; }
  .feature-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .fi-blue  { background: rgba(44,123,255,0.20); }
  .fi-green { background: rgba(34,180,120,0.18); }
  .fi-amber { background: rgba(240,180,40,0.18); }
  .fi-pink  { background: rgba(200,80,200,0.18); }

  .feature-label {
    font-size: 18px; font-weight: 600; color: #EEF1F8;
  }

  /* ===== REAL SCREENSHOT PHONE — Scene 5 ===== */
  .phone-shell {
    flex-shrink: 0;
    width: 340px; height: 700px;
    opacity: 0;
    animation: phoneEnter 0.72s 0.22s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }

  .phone-inner {
    width: 340px; height: 700px;
    animation: phoneFloat 4s 1.1s ease-in-out infinite;
  }

  .phone-frame {
    width: 340px; height: 700px;
    border-radius: 44px;
    background: #08090F;
    border: 2.5px solid rgba(255,255,255,0.16);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 40px 100px rgba(0,0,0,0.75),
      0 0 80px rgba(44,123,255,0.14),
      inset 0 0 0 1px rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }

  .phone-notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 30px;
    background: #08090F;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.10);
    z-index: 10;
  }

  .phone-screenshot {
    position: absolute; inset: 0;
    background: url('file:///D:/event-ai/video/demo/06_smeta.png') center center / cover no-repeat;
    border-radius: 42px;
  }

  .phone-top-blur {
    position: absolute; top: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(to bottom, rgba(8,9,15,0.8) 0%, transparent 100%);
    border-radius: 42px 42px 0 0;
    z-index: 5;
  }
  .phone-bottom-blur {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(to top, rgba(8,9,15,0.9) 0%, transparent 100%);
    border-radius: 0 0 42px 42px;
    z-index: 5;
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px;
  }
  .home-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay"></div>

  <div class="logo">
    <img src="file:///D:/event-ai/assets/mark-dark.png" onerror="this.style.display='none'">
    <span class="logo-shine">EVENT <span>AI</span></span>
  </div>
  <div class="scene-num">05 / 07</div>

  <div class="layout">
    <!-- Left text column -->
    <div class="text-col">
      <div class="kicker">Всё включено</div>
      <div class="headline">Смета, сценарий,<br>тайминг, <em>пригласительные</em></div>
      <div class="sub">Весь пакет документов<br>формируется автоматически</div>
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-icon fi-blue">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5AA0FF" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          </div>
          <div class="feature-label">Детальная смета</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon fi-green">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22C47A" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          </div>
          <div class="feature-label">Сценарий мероприятия</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon fi-amber">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F0C040" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          </div>
          <div class="feature-label">Тайминг по минутам</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon fi-pink">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C050C0" stroke-width="1.8"><path d="M20 12v10H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>
          </div>
          <div class="feature-label">Пригласительные — бесплатно</div>
        </div>
      </div>
    </div>

    <!-- Phone with REAL screenshot -->
    <div class="phone-shell">
      <div class="phone-inner">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-screenshot"></div>
          <div class="phone-top-blur"></div>
          <div class="phone-bottom-blur">
            <div class="home-bar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
