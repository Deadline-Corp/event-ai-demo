<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Scene 3 – AI чат</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

  /* ===================== KEYFRAMES ===================== */

  /* Subtle background drift ~6.6s */
  @keyframes bgDrift {
    from { transform: scale(1.04) translate(0, 0); }
    to   { transform: scale(1.07) translate(-18px, -10px); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeRight {
    from { opacity: 0; transform: translateX(28px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Phone bounce-in */
  @keyframes phoneEnter {
    0%   { opacity: 0; transform: scale(0.76) translateY(30px); }
    65%  { transform: scale(1.04) translateY(-5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Subtle phone parallax float after entrance */
  @keyframes phoneFloat {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-6px); }
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: scale(0.72) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes chipIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes dotBounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.6; }
    40%         { transform: translateY(-5px); opacity: 1; }
  }

  @keyframes revealClip {
    from { clip-path: inset(0 0 100% 0); opacity: 0; }
    to   { clip-path: inset(0 0 0% 0);   opacity: 1; }
  }

  /* Logo shine */
  @keyframes logoShine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* ===================== ELEMENTS ===================== */

  .bg-photo {
    position: absolute; inset: 0;
    background: url('file:///D:/event-ai/video/gen/bg-hall.png') center center / cover no-repeat;
    filter: brightness(0.28) saturate(0.7);
    transform-origin: center center;
    animation: bgDrift 6.6s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(4,6,11,0.60) 0%,
      rgba(4,6,11,0.35) 40%,
      rgba(4,6,11,0.35) 65%,
      rgba(4,6,11,0.85) 100%
    );
  }

  .logo {
    position: absolute; top: 52px; left: 64px; z-index: 30;
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeDown 0.55s 0.05s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .logo img { height: 36px; }
  .logo-shine {
    font-size: 20px; font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(90deg, #EEF1F8 20%, #8EC5FF 40%, #EEF1F8 60%, #EEF1F8 80%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logoShine 3.5s 1.5s ease-in-out infinite;
  }
  .logo-shine span { -webkit-text-fill-color: #5AA0FF; }

  .scene-num {
    position: absolute; top: 56px; right: 64px; z-index: 30;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: rgba(238,241,248,0.35); letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeDown 0.4s 0.2s ease forwards;
  }

  /* Layout: phone left, text right */
  .layout {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 100px;
  }

  /* ===== REAL SCREENSHOT PHONE — Scene 3 ===== */
  .phone-shell {
    position: relative;
    width: 340px; height: 700px;
    opacity: 0;
    animation: phoneEnter 0.72s 0.22s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
    /* float after entrance kicks in at 1.2s */
  }
  .phone-shell::after {
    content: '';
    position: absolute; inset: 0;
    animation: phoneFloat 4s 1.2s ease-in-out infinite;
    pointer-events: none;
  }

  /* The actual float is applied to inner element so it compounds */
  .phone-inner {
    width: 340px; height: 700px;
    animation: phoneFloat 4s 1.2s ease-in-out infinite;
  }

  /* Dark rounded phone frame */
  .phone-frame {
    width: 340px; height: 700px;
    border-radius: 44px;
    background: #08090F;
    border: 2.5px solid rgba(255,255,255,0.16);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 40px 100px rgba(0,0,0,0.75),
      0 0 80px rgba(44,123,255,0.15),
      inset 0 0 0 1px rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }

  /* Dynamic island top */
  .phone-notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 30px;
    background: #08090F;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.10);
    z-index: 10;
  }

  /* Real screenshot inside */
  .phone-screenshot {
    position: absolute;
    inset: 0;
    background:
      url('file:///D:/event-ai/video/demo/03_chat.png') center center / cover no-repeat;
    border-radius: 42px;
  }

  /* Top status bar overlay to blend */
  .phone-top-blur {
    position: absolute; top: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(to bottom, rgba(8,9,15,0.8) 0%, transparent 100%);
    border-radius: 42px 42px 0 0;
    z-index: 5;
  }
  /* Bottom home bar */
  .phone-bottom-blur {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(to top, rgba(8,9,15,0.9) 0%, transparent 100%);
    border-radius: 0 0 42px 42px;
    z-index: 5;
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px;
  }
  .home-bar {
    width: 100px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
  }

  /* Right side text */
  .text-block {
    max-width: 680px;
  }
  .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: #5AA0FF;
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeRight 0.50s 0.35s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .kicker::before { content: ''; display: block; width: 32px; height: 1px; background: #5AA0FF; }

  .headline {
    font-size: 58px; font-weight: 700;
    color: #EEF1F8; line-height: 1.15;
    letter-spacing: -0.025em;
    text-shadow: 0 2px 48px rgba(0,0,0,0.9);
    margin-bottom: 28px;
    opacity: 0;
    animation: revealClip 0.70s 0.52s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .headline em { color: #2C7BFF; font-style: normal; }

  .sub {
    font-size: 22px; font-weight: 400;
    color: rgba(238,241,248,0.60);
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 0.55s 0.78s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay"></div>

  <div class="logo">
    <img src="file:///D:/event-ai/assets/mark-dark.png" onerror="this.style.display='none'">
    <span class="logo-shine">EVENT <span>AI</span></span>
  </div>
  <div class="scene-num">03 / 07</div>

  <div class="layout">
    <!-- Phone with REAL screenshot -->
    <div class="phone-shell">
      <div class="phone-inner">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-screenshot"></div>
          <div class="phone-top-blur"></div>
          <div class="phone-bottom-blur">
            <div class="home-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Text -->
    <div class="text-block">
      <div class="kicker">Как это работает</div>
      <div class="headline">AI задаёт вопросы<br>и собирает <em>заявку</em></div>
      <div class="sub">Несколько ответов — и система<br>знает всё о вашем мероприятии</div>
    </div>
  </div>
</body>
</html>
