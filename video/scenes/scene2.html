<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Scene 2 – Решение</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

  /* ===================== KEYFRAMES ===================== */

  /* Pan + zoom 4.7s — slight parallax: bg moves faster, fg stays */
  @keyframes bgPanZoom {
    from { transform: scale(1)    translateX(0); }
    to   { transform: scale(1.09) translateX(-24px); }
  }

  /* FG parallax counter — elements drift slightly opposite direction */
  @keyframes fgParallax {
    from { transform: translate(0, 0); }
    to   { transform: translate(4px, -3px); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeLeft {
    from { opacity: 0; transform: translateX(-24px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.82); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes pillPop {
    0%   { opacity: 0; transform: scale(0.70) translateY(10px); }
    70%  { transform: scale(1.05) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes glowPulse {
    0%,100% { opacity: 0.6; }
    50%     { opacity: 1.0; }
  }

  /* Logo shine sweep */
  @keyframes logoShine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* ===================== ELEMENTS ===================== */

  .bg-photo {
    position: absolute; inset: 0;
    background: url('file:///D:/event-ai/video/gen/s2-solution.png') center center / cover no-repeat;
    transform-origin: center center;
    animation: bgPanZoom 4.7s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(4,6,11,0.55) 0%,
      rgba(4,6,11,0.10) 30%,
      rgba(4,6,11,0.10) 55%,
      rgba(4,6,11,0.80) 78%,
      rgba(4,6,11,0.97) 100%
    );
  }

  .overlay-left {
    position: absolute; inset: 0;
    background: linear-gradient(to right,
      rgba(4,6,11,0.75) 0%,
      rgba(4,6,11,0.45) 35%,
      transparent 65%
    );
  }

  .glow {
    position: absolute;
    top: 30%; left: 8%;
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(44,123,255,0.18) 0%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 3s 1s ease-in-out infinite;
  }

  /* FG content drifts slightly opposite the bg for parallax */
  .fg-wrap {
    position: absolute; inset: 0;
    animation: fgParallax 4.7s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  .logo {
    position: absolute; top: 52px; left: 64px; z-index: 30;
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeDown 0.55s 0.05s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .logo img { height: 36px; }

  /* Logo text shine */
  .logo-shine {
    font-size: 20px; font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(90deg, #EEF1F8 20%, #8EC5FF 40%, #EEF1F8 60%, #EEF1F8 80%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logoShine 3.5s 1.2s ease-in-out infinite;
  }
  .logo-shine span { -webkit-text-fill-color: #5AA0FF; }

  .scene-num {
    position: absolute; top: 56px; right: 64px; z-index: 30;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: rgba(238,241,248,0.35); letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeDown 0.4s 0.2s ease forwards;
  }

  .content {
    position: absolute;
    left: 120px; top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    max-width: 780px;
    animation: fgParallax 4.7s cubic-bezier(0.25, 0.10, 0.25, 1.0) forwards;
  }

  .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: #5AA0FF;
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeLeft 0.5s 0.30s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .kicker::before {
    content: '';
    display: block; width: 32px; height: 1px;
    background: #5AA0FF;
  }

  .brand-logo-large {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 40px;
    opacity: 0;
    animation: scaleIn 0.65s 0.50s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }
  .brand-logo-large img { height: 72px; }

  .tagline {
    font-size: 36px; font-weight: 400;
    color: rgba(238,241,248,0.80);
    line-height: 1.4; letter-spacing: -0.01em;
    text-shadow: 0 2px 32px rgba(0,0,0,0.8);
    max-width: 700px;
    opacity: 0;
    animation: fadeUp 0.55s 0.70s cubic-bezier(0.22, 0.6, 0.36, 1) forwards;
  }

  .pills {
    display: flex; gap: 14px;
    margin-top: 44px;
    flex-wrap: wrap;
  }
  .pill {
    padding: 10px 20px;
    border-radius: 100px;
    background: rgba(44,123,255,0.14);
    border: 1px solid rgba(44,123,255,0.35);
    font-size: 14px; font-weight: 500;
    color: #8EC5FF;
    letter-spacing: 0.02em;
    opacity: 0;
    animation-name: pillPop;
    animation-duration: 0.50s;
    animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
    animation-fill-mode: forwards;
  }
  .pill:nth-child(1) { animation-delay: 0.90s; }
  .pill:nth-child(2) { animation-delay: 1.05s; }
  .pill:nth-child(3) { animation-delay: 1.20s; }
  .pill:nth-child(4) { animation-delay: 1.35s; }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay"></div>
  <div class="overlay-left"></div>
  <div class="glow"></div>

  <div class="logo">
    <img src="file:///D:/event-ai/assets/mark-dark.png" onerror="this.style.display='none'">
    <span class="logo-shine">EVENT <span>AI</span></span>
  </div>
  <div class="scene-num">02 / 07</div>

  <div class="content">
    <div class="kicker">Решение</div>
    <div class="brand-logo-large">
      <img src="file:///D:/event-ai/assets/mark-dark.png" height="72" onerror="this.style.display='none'">
      <div style="font-size:72px;font-weight:700;color:#EEF1F8;letter-spacing:-0.03em;line-height:1;text-shadow:0 0 60px rgba(44,123,255,0.3);">EVENT <span style="color:#2C7BFF">AI</span></div>
    </div>
    <div class="tagline">Всё мероприятие —<br>в одном приложении</div>
    <div class="pills">
      <div class="pill">AI-подбор подрядчиков</div>
      <div class="pill">Готовая смета</div>
      <div class="pill">Онлайн-бронирование</div>
      <div class="pill">Поддержка 24/7</div>
    </div>
  </div>
</body>
</html>
