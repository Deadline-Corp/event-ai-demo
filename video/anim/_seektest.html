<!doctype html><meta charset=utf8><style>
html,body{margin:0}.stage{width:1920px;height:1080px;background:#04060B;position:relative;overflow:hidden;font-family:sans-serif}
.box{position:absolute;top:460px;left:80px;width:240px;height:160px;border-radius:24px;background:linear-gradient(135deg,#5AA0FF,#0C57E6);animation:slide 2s cubic-bezier(.16,1,.3,1) forwards}
@keyframes slide{0%{transform:translateX(0) scale(.6);opacity:0}100%{transform:translateX(1500px) scale(1);opacity:1}}
.t{position:absolute;bottom:120px;left:80px;color:#fff;font-size:90px;font-weight:800;opacity:0;animation:fade 2s ease forwards}
@keyframes fade{0%{opacity:0;transform:translateY(40px)}60%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:none}}
</style><div class=stage><div class=box></div><div class=t>EVENT AI</div></div>
