<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Scene 1 — Событие мечты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #04060B;
    font-family: 'Space Grotesk', sans-serif;
  }

  .scene {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('file:///D:/event-ai/video/gen/s7-celebration.png');
    background-size: cover;
    background-position: center 30%;
    transform-origin: center center;
    animation: bgZoom 4s ease-out forwards;
  }

  @keyframes bgZoom {
    0%   { transform: scale(1.08); }
    100% { transform: scale(1.0); }
  }

  /* ── GRADIENT OVERLAYS ── */
  .overlay-top {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(4,6,11,0.65) 0%,
      rgba(4,6,11,0.15) 40%,
      rgba(4,6,11,0.10) 60%,
      rgba(4,6,11,0.80) 80%,
      rgba(4,6,11,0.97) 100%
    );
  }

  /* ── AMBIENT LIGHT ── */
  .ambient {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(44,123,255,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: ambientPulse 3s ease-in-out infinite alternate;
  }

  @keyframes ambientPulse {
    0%   { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
  }

  /* ── LOGO MARK ── */
  .logo-mark {
    position: absolute;
    top: 72px;
    right: 64px;
    width: 56px;
    height: 56px;
    opacity: 0;
    animation: fadeIn 0.6s 0.2s ease-out forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── SCENE NUMBER ── */
  .scene-tag {
    position: absolute;
    top: 84px;
    left: 64px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.18em;
    color: rgba(90,160,255,0.7);
    opacity: 0;
    animation: fadeIn 0.6s 0.3s ease-out forwards;
  }

  /* ── CONTENT BLOCK ── */
  .content {
    position: absolute;
    bottom: 200px;
    left: 0;
    right: 0;
    padding: 0 72px;
    text-align: left;
  }

  /* Label above headline */
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.22em;
    color: #5AA0FF;
    text-transform: uppercase;
    clip-path: inset(0 100% 0 0);
    animation: clipReveal 0.7s 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    margin-bottom: 28px;
  }

  @keyframes clipReveal {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }

  /* Main headline — word by word */
  .headline {
    font-size: 108px;
    font-weight: 700;
    line-height: 1.0;
    color: #EEF1F8;
    letter-spacing: -0.02em;
  }

  .headline .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(40px);
  }

  .headline .word:nth-child(1) { animation: wordUp 0.65s 0.7s cubic-bezier(0.22,1,0.36,1) forwards; }
  .headline .word:nth-child(2) { animation: wordUp 0.65s 0.88s cubic-bezier(0.22,1,0.36,1) forwards; }

  @keyframes wordUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Accent word */
  .headline .accent {
    color: #5AA0FF;
  }

  /* Thin rule */
  .rule {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #2C7BFF, transparent);
    margin-top: 40px;
    animation: ruleExpand 0.8s 1.4s ease-out forwards;
  }

  @keyframes ruleExpand {
    from { width: 0; }
    to   { width: 220px; }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="bg"></div>
  <div class="overlay-top"></div>
  <div class="ambient"></div>

  <img class="logo-mark" src="file:///D:/event-ai/assets/mark-light.png" alt="EVENT AI">
  <div class="scene-tag">01 / 07</div>

  <div class="content">
    <div class="eyebrow">Event AI</div>
    <h1 class="headline">
      <span class="word">Событие</span>&nbsp;<span class="word accent">мечты</span>
    </h1>
    <div class="rule"></div>
  </div>
</div>
</body>
</html>
