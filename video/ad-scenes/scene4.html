<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Scene 4 — Подбор подрядчиков</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #04060B; font-family: 'Space Grotesk', sans-serif; }
  .scene { position: relative; width: 1080px; height: 1920px; overflow: hidden; }

  .bg {
    position: absolute; inset: 0;
    background-image: url('file:///D:/event-ai/assets/img/hall.jpg');
    background-size: cover;
    background-position: center 45%;
    animation: bgPan 4.5s ease-out forwards;
  }
  @keyframes bgPan {
    0%   { transform: scale(1.08) translateY(10px); }
    100% { transform: scale(1.0) translateY(0); }
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(4,6,11,0.55) 0%,
      rgba(4,6,11,0.08) 35%,
      rgba(4,6,11,0.25) 58%,
      rgba(4,6,11,0.90) 80%,
      rgba(4,6,11,0.99) 100%
    );
  }

  .logo-mark {
    position: absolute; top: 72px; right: 64px;
    width: 56px; height: 56px;
    opacity: 0; animation: fadeIn 0.6s 0.2s ease-out forwards;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .scene-tag {
    position: absolute; top: 84px; left: 64px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 300; letter-spacing: 0.18em;
    color: rgba(90,160,255,0.7);
    opacity: 0; animation: fadeIn 0.5s 0.3s ease-out forwards;
  }

  /* Contractor cards — floating grid */
  .cards {
    position: absolute;
    top: 680px; left: 60px; right: 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(90,160,255,0.20);
    border-radius: 16px;
    padding: 24px 28px;
    backdrop-filter: blur(8px);
    opacity: 0;
    transform: translateY(24px);
  }
  .card:nth-child(1) { animation: cardIn 0.55s 0.45s cubic-bezier(0.22,1,0.36,1) forwards; }
  .card:nth-child(2) { animation: cardIn 0.55s 0.58s cubic-bezier(0.22,1,0.36,1) forwards; }
  .card:nth-child(3) { animation: cardIn 0.55s 0.71s cubic-bezier(0.22,1,0.36,1) forwards; }
  .card:nth-child(4) { animation: cardIn 0.55s 0.84s cubic-bezier(0.22,1,0.36,1) forwards; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-icon {
    font-size: 32px; margin-bottom: 10px;
    filter: grayscale(0.3);
  }
  .card-title {
    font-size: 24px; font-weight: 600; color: #EEF1F8;
    margin-bottom: 4px;
  }
  .card-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px; color: rgba(90,160,255,0.7);
  }

  /* Verified badge */
  .card-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 12px;
    border-radius: 40px;
    background: rgba(44,123,255,0.15);
    border: 1px solid rgba(44,123,255,0.35);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: #5AA0FF;
  }

  .content {
    position: absolute; bottom: 140px; left: 0; right: 0;
    padding: 0 72px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 400; letter-spacing: 0.24em;
    color: #5AA0FF; text-transform: uppercase;
    clip-path: inset(0 100% 0 0);
    animation: clipReveal 0.7s 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
    margin-bottom: 28px;
  }
  @keyframes clipReveal {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }

  .headline .line {
    display: block; font-size: 88px; font-weight: 700;
    color: #EEF1F8; letter-spacing: -0.025em; overflow: hidden;
  }
  .line-inner {
    display: block; opacity: 0; transform: translateY(48px);
  }
  .headline .line:nth-child(1) .line-inner { animation: slideUp 0.6s 1.25s cubic-bezier(0.22,1,0.36,1) forwards; }
  .headline .line:nth-child(2) .line-inner { animation: slideUp 0.6s 1.40s cubic-bezier(0.22,1,0.36,1) forwards; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(48px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .headline .accent { color: #5AA0FF; }
</style>
</head>
<body>
<div class="scene">
  <div class="bg"></div>
  <div class="overlay"></div>

  <img class="logo-mark" src="file:///D:/event-ai/assets/mark-light.png" alt="EVENT AI">
  <div class="scene-tag">04 / 07</div>

  <div class="cards">
    <div class="card">
      <div class="card-icon">🎤</div>
      <div class="card-title">Ведущий</div>
      <div class="card-sub">3 варианта</div>
      <div class="card-badge">✓ Проверен</div>
    </div>
    <div class="card">
      <div class="card-icon">🍽️</div>
      <div class="card-title">Кейтеринг</div>
      <div class="card-sub">5 вариантов</div>
      <div class="card-badge">✓ Проверен</div>
    </div>
    <div class="card">
      <div class="card-icon">📸</div>
      <div class="card-title">Фотограф</div>
      <div class="card-sub">4 варианта</div>
      <div class="card-badge">✓ Проверен</div>
    </div>
    <div class="card">
      <div class="card-icon">🎵</div>
      <div class="card-title">Музыканты</div>
      <div class="card-sub">2 варианта</div>
      <div class="card-badge">✓ Проверен</div>
    </div>
  </div>

  <div class="content">
    <div class="eyebrow">Подрядчики</div>
    <div class="headline">
      <span class="line"><span class="line-inner">Подбор под</span></span>
      <span class="line"><span class="line-inner"><span class="accent">вас</span></span></span>
    </div>
  </div>
</div>
</body>
</html>
