<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Scene 7 — EVENT AI Finale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #04060B; font-family: 'Space Grotesk', sans-serif; }
  .scene { position: relative; width: 1080px; height: 1920px; overflow: hidden; }

  .bg {
    position: absolute; inset: 0;
    background-image: url('file:///D:/event-ai/video/gen/s7-celebration.png');
    background-size: cover;
    background-position: center 35%;
    animation: bgZoom 5s ease-out forwards;
  }
  @keyframes bgZoom {
    0%   { transform: scale(1.05); }
    100% { transform: scale(1.0); }
  }

  /* Heavy dark overlay — finale needs strong brand focus */
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(4,6,11,0.80) 0%,
      rgba(4,6,11,0.55) 25%,
      rgba(4,6,11,0.65) 55%,
      rgba(4,6,11,0.95) 80%,
      rgba(4,6,11,1.0) 100%
    );
  }

  /* Central radial glow for brand area */
  .center-glow {
    position: absolute;
    width: 900px; height: 900px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(44,123,255,0.14) 0%, transparent 65%);
    top: 50%; left: 50%;
    transform: translate(-50%, -52%);
    animation: glowIn 1.2s 0.3s ease-out both;
  }
  @keyframes glowIn {
    from { opacity: 0; transform: translate(-50%, -52%) scale(0.7); }
    to   { opacity: 1; transform: translate(-50%, -52%) scale(1); }
  }

  /* Fine particle dots — decorative */
  .particles {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, rgba(90,160,255,0.5) 1px, transparent 1px),
      radial-gradient(circle, rgba(90,160,255,0.3) 1px, transparent 1px);
    background-size: 120px 120px, 80px 80px;
    background-position: 0 0, 60px 60px;
    opacity: 0;
    animation: particleFade 1.5s 0.6s ease-out forwards;
  }
  @keyframes particleFade {
    from { opacity: 0; }
    to   { opacity: 0.15; }
  }

  /* ── MAIN CONTENT — centred vertically ── */
  .center-block {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 80px;
  }

  /* Thin accent line above logo */
  .top-rule {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(44,123,255,0.6), transparent);
    animation: ruleExpand 0.8s 0.5s ease-out forwards;
    margin-bottom: 52px;
  }
  @keyframes ruleExpand {
    from { width: 0; }
    to   { width: 280px; }
  }

  /* Main wordmark logo */
  .logo-wordmark {
    width: 520px;
    opacity: 0;
    animation: logoReveal 0.9s 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes logoReveal {
    from { opacity: 0; transform: scale(0.94) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Tagline */
  .tagline {
    margin-top: 44px;
    font-size: 36px;
    font-weight: 400;
    color: rgba(238,241,248,0.70);
    letter-spacing: 0.02em;
    line-height: 1.3;
    opacity: 0;
    animation: fadeSlideUp 0.7s 1.4s ease-out forwards;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Divider dot */
  .divider {
    margin-top: 48px;
    display: flex; align-items: center; gap: 16px;
    opacity: 0;
    animation: fadeSlideUp 0.6s 1.7s ease-out forwards;
  }
  .div-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(90,160,255,0.4));
  }
  .div-line.right { background: linear-gradient(270deg, transparent, rgba(90,160,255,0.4)); }
  .div-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #2C7BFF;
  }

  /* CTA */
  .cta {
    margin-top: 48px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 400; letter-spacing: 0.18em;
    color: rgba(90,160,255,0.85);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeSlideUp 0.6s 1.4s ease-out forwards;
  }

  /* City label */
  .city-pill {
    margin-top: 28px;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 16px 36px;
    border-radius: 60px;
    border: 1px solid rgba(90,160,255,0.25);
    background: rgba(255,255,255,0.04);
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; color: rgba(238,241,248,0.55); letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeSlideUp 0.6s 1.6s ease-out forwards;
  }
  .city-dot { width: 8px; height: 8px; border-radius: 50%; background: #2C7BFF; }

  /* Bottom thin rule */
  .bottom-rule {
    position: absolute;
    bottom: 120px; left: 72px; right: 72px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(44,123,255,0.3), transparent);
    opacity: 0;
    animation: fadeIn 0.8s 1.8s ease-out forwards;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div class="scene">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="center-glow"></div>
  <div class="particles"></div>

  <div class="center-block">
    <div class="top-rule"></div>
    <img class="logo-wordmark" src="file:///D:/event-ai/assets/logo-dark.png" alt="EVENT AI">
    <div class="tagline">умная организация<br>мероприятий</div>
    <div class="divider">
      <div class="div-line"></div>
      <div class="div-dot"></div>
      <div class="div-line right"></div>
    </div>
    <div class="cta">Попробуйте демо</div>
    <div class="city-pill">
      <span class="city-dot"></span>
      Алматы
    </div>
  </div>

  <div class="bottom-rule"></div>
</div>
</body>
</html>
