<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Scene 2 — Без хаоса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #04060B; font-family: 'Space Grotesk', sans-serif; }
  .scene { position: relative; width: 1080px; height: 1920px; overflow: hidden; }

  .bg {
    position: absolute; inset: 0;
    background-image: url('file:///D:/event-ai/video/gen/bg-hall.png');
    background-size: cover;
    background-position: center 40%;
    animation: bgDrift 4s ease-out forwards;
  }
  @keyframes bgDrift {
    0%   { transform: scale(1.06) translateX(-10px); }
    100% { transform: scale(1.0) translateX(0); }
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(4,6,11,0.55) 0%,
      rgba(4,6,11,0.10) 35%,
      rgba(4,6,11,0.20) 55%,
      rgba(4,6,11,0.88) 82%,
      rgba(4,6,11,0.98) 100%
    );
  }

  /* Horizontal ambient streak */
  .streak {
    position: absolute;
    top: 46%;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(44,123,255,0.25), transparent);
    animation: streakFade 1s 0.4s ease-out both;
  }
  @keyframes streakFade {
    from { opacity: 0; transform: scaleX(0.3); }
    to   { opacity: 1; transform: scaleX(1); }
  }

  .logo-mark {
    position: absolute; top: 72px; right: 64px;
    width: 56px; height: 56px;
    opacity: 0; animation: fadeIn 0.6s 0.2s ease-out forwards;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .scene-tag {
    position: absolute; top: 84px; left: 64px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 300; letter-spacing: 0.18em;
    color: rgba(90,160,255,0.7);
    opacity: 0; animation: fadeIn 0.5s 0.3s ease-out forwards;
  }

  .content {
    position: absolute; bottom: 180px; left: 0; right: 0;
    padding: 0 72px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 400; letter-spacing: 0.24em;
    color: #5AA0FF; text-transform: uppercase;
    clip-path: inset(0 100% 0 0);
    animation: clipReveal 0.7s 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
    margin-bottom: 32px;
  }
  @keyframes clipReveal {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }

  /* Three-line headline, each line slides up separately */
  .headline { line-height: 1.05; }
  .headline .line {
    display: block;
    font-size: 86px;
    font-weight: 700;
    color: #EEF1F8;
    letter-spacing: -0.025em;
    overflow: hidden;
  }
  .headline .line-inner {
    display: block;
    opacity: 0;
    transform: translateY(50px);
  }
  .headline .line:nth-child(1) .line-inner { animation: slideUp 0.6s 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }
  .headline .line:nth-child(2) .line-inner { animation: slideUp 0.6s 0.76s cubic-bezier(0.22,1,0.36,1) forwards; }
  .headline .line:nth-child(3) .line-inner { animation: slideUp 0.6s 0.92s cubic-bezier(0.22,1,0.36,1) forwards; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(50px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .headline .dim { color: rgba(238,241,248,0.45); }

  .sub {
    margin-top: 36px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 300; letter-spacing: 0.08em;
    color: rgba(238,241,248,0.5);
    opacity: 0;
    animation: fadeIn 0.7s 1.3s ease-out forwards;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="streak"></div>

  <img class="logo-mark" src="file:///D:/event-ai/assets/mark-light.png" alt="EVENT AI">
  <div class="scene-tag">02 / 07</div>

  <div class="content">
    <div class="eyebrow">Проблема</div>
    <div class="headline">
      <span class="line"><span class="line-inner">Без хаоса,</span></span>
      <span class="line"><span class="line-inner dim">звонков</span></span>
      <span class="line"><span class="line-inner dim">и таблиц</span></span>
    </div>
    <div class="sub">Всё в одном диалоге</div>
  </div>
</div>
</body>
</html>
