<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Scene 6 — Бронь в пару касаний</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #04060B; font-family: 'Space Grotesk', sans-serif; }
  .scene { position: relative; width: 1080px; height: 1920px; overflow: hidden; }

  .bg {
    position: absolute; inset: 0;
    background-image: url('file:///D:/event-ai/video/gen/bg-hall.png');
    background-size: cover;
    background-position: center 55%;
    animation: bgZoom 4s ease-out forwards;
  }
  @keyframes bgZoom {
    0%   { transform: scale(1.06) translateX(12px); }
    100% { transform: scale(1.0) translateX(0); }
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(4,6,11,0.65) 0%,
      rgba(4,6,11,0.15) 35%,
      rgba(4,6,11,0.35) 58%,
      rgba(4,6,11,0.90) 80%,
      rgba(4,6,11,0.99) 100%
    );
  }

  /* Subtle blue vignette */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 120% 80% at 50% 50%, transparent 40%, rgba(4,6,11,0.6) 100%);
  }

  .logo-mark {
    position: absolute; top: 72px; right: 64px;
    width: 56px; height: 56px;
    opacity: 0; animation: fadeIn 0.6s 0.2s ease-out forwards;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .scene-tag {
    position: absolute; top: 84px; left: 64px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 300; letter-spacing: 0.18em;
    color: rgba(90,160,255,0.7);
    opacity: 0; animation: fadeIn 0.5s 0.3s ease-out forwards;
  }

  /* Phone UI mockup */
  .phone-ui {
    position: absolute;
    top: 620px; left: 72px; right: 72px;
  }

  .ui-step {
    display: flex; align-items: center; gap: 24px;
    padding: 24px 28px;
    margin-bottom: 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(90,160,255,0.18);
    backdrop-filter: blur(8px);
    opacity: 0;
    transform: translateX(-20px);
  }
  .ui-step:nth-child(1) { animation: stepIn 0.55s 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }
  .ui-step:nth-child(2) { animation: stepIn 0.55s 0.58s cubic-bezier(0.22,1,0.36,1) forwards; }
  .ui-step:nth-child(3) { animation: stepIn 0.55s 0.76s cubic-bezier(0.22,1,0.36,1) forwards; }

  .ui-step.active {
    background: rgba(44,123,255,0.12);
    border-color: rgba(44,123,255,0.45);
  }

  @keyframes stepIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .step-dot {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 16px;
    font-weight: 400;
  }
  .step-dot.done {
    background: rgba(44,123,255,0.2);
    color: #5AA0FF;
    border: 1px solid rgba(44,123,255,0.5);
  }
  .step-dot.current {
    background: #2C7BFF;
    color: #fff;
    border: none;
    animation: dotPulse 1.5s 1s ease-in-out infinite alternate;
  }
  @keyframes dotPulse {
    0%   { box-shadow: 0 0 0 0 rgba(44,123,255,0.4); }
    100% { box-shadow: 0 0 0 10px rgba(44,123,255,0); }
  }

  .step-text {
    font-size: 28px; font-weight: 500; color: #EEF1F8;
  }
  .step-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 19px; color: rgba(90,160,255,0.7); margin-top: 3px;
  }

  /* CTA Button */
  .cta-btn {
    width: 100%;
    padding: 36px 0;
    background: linear-gradient(135deg, #2C7BFF, #5AA0FF);
    border-radius: 20px;
    text-align: center;
    font-size: 32px; font-weight: 600; color: #fff;
    letter-spacing: 0.02em;
    margin-top: 24px;
    opacity: 0;
    transform: translateY(20px);
    animation: btnIn 0.6s 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
    box-shadow: 0 20px 60px rgba(44,123,255,0.35);
  }
  @keyframes btnIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .content {
    position: absolute; bottom: 130px; left: 0; right: 0;
    padding: 0 72px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 400; letter-spacing: 0.24em;
    color: #5AA0FF; text-transform: uppercase;
    clip-path: inset(0 100% 0 0);
    animation: clipReveal 0.7s 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
    margin-bottom: 24px;
  }
  @keyframes clipReveal {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }

  .headline .line {
    display: block; font-size: 86px; font-weight: 700;
    color: #EEF1F8; letter-spacing: -0.025em; overflow: hidden;
  }
  .line-inner {
    display: block; opacity: 0; transform: translateY(44px);
  }
  .headline .line:nth-child(1) .line-inner { animation: slideUp 0.6s 1.55s cubic-bezier(0.22,1,0.36,1) forwards; }
  .headline .line:nth-child(2) .line-inner { animation: slideUp 0.6s 1.70s cubic-bezier(0.22,1,0.36,1) forwards; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(44px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .accent { color: #5AA0FF; }
</style>
</head>
<body>
<div class="scene">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="vignette"></div>

  <img class="logo-mark" src="file:///D:/event-ai/assets/mark-light.png" alt="EVENT AI">
  <div class="scene-tag">06 / 07</div>

  <div class="phone-ui">
    <div class="ui-step">
      <div class="step-dot done">✓</div>
      <div>
        <div class="step-text">Запрос принят</div>
        <div class="step-sub">Зал на 80 чел, лофт, 15 авг</div>
      </div>
    </div>
    <div class="ui-step">
      <div class="step-dot done">✓</div>
      <div>
        <div class="step-text">Подбор готов</div>
        <div class="step-sub">12 подрядчиков · смета ₸4.2М</div>
      </div>
    </div>
    <div class="ui-step active">
      <div class="step-dot current">→</div>
      <div>
        <div class="step-text">Подтвердить</div>
        <div class="step-sub">Одно нажатие</div>
      </div>
    </div>
    <div class="cta-btn">Забронировать</div>
  </div>

  <div class="content">
    <div class="eyebrow">Быстро</div>
    <div class="headline">
      <span class="line"><span class="line-inner">Бронь —</span></span>
      <span class="line"><span class="line-inner">в <span class="accent">пару касаний</span></span></span>
    </div>
  </div>
</div>
</body>
</html>
